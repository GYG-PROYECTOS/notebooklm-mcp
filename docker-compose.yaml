services:
  notebooklm-mcp:
    build: .
    container_name: notebooklm-mcp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTO_LOGIN_ENABLED=true
      - LOGIN_EMAIL=juancaballero19918810@gmail.com
      - LOGIN_PASSWORD=:)juancaballero19918810:
    volumes:
      - notebooklm-data:/root/.local/share/notebooklm-mcp
    shm_size: '1gb'
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.notebooklm-mcp.rule=PathPrefix(`/`)'
      - 'traefik.http.routers.notebooklm-mcp.entrypoints=web'
      - 'traefik.http.services.notebooklm-mcp.loadbalancer.server.port=3000'

volumes:
  notebooklm-data:
    driver: local
