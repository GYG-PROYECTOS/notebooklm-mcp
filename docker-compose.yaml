services:
  notebooklm-mcp:
    build: .
    container_name: notebooklm-mcp
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - notebooklm-data:/root/.local/share/notebooklm-mcp
    shm_size: '1gb'
    security_opt:
      - seccomp:unconfined

volumes:
  notebooklm-data:
    driver: local
